{% extends "base.html" %}

{% block content %}

<div class="container mt-5">

<h1 class="mb-4">Library</h1>

{% for item in library_data %}

    <div class="mb-5">

        <div class="d-flex justify-content-between align-items-center mb-3">
            <h3>{{ item.category.name }}</h3>

            <a href="{% url 'category_books' item.category.slug %}" class="btn btn-outline-primary btn-sm">
                View More
            </a>
        </div>

        <div class="row">

            {% for book in item.books %}

            <div class="col-md-3 mb-4">
                <!-- Make the whole card clickable -->
                <a href="{% url 'book_detail' book.id %}" style="text-decoration: none; color: inherit;">
                    <div class="card h-100 shadow-sm">

                        {% if book.cover_image_url %}
                        <img src="{{ book.cover_image_url }}"
                             class="card-img-top"
                             alt="{{ book.title }}"
                             style="height:260px; object-fit:cover;">
                        {% else %}
                        <img src="https://via.placeholder.com/200x260?text=No+Cover"
                             class="card-img-top"
                             alt="No Cover"
                             style="height:260px; object-fit:cover;">
                        {% endif %}

                        <div class="card-body">

                            <h6 class="card-title">
                                {{ book.title }}
                            </h6>

                            <p class="card-text text-muted mb-0">
                                {{ book.author }}
                            </p>

                        </div>

                    </div>
                </a>
            </div>

            {% endfor %}

        </div>

    </div>

{% endfor %}

</div>

{% endblock %}
